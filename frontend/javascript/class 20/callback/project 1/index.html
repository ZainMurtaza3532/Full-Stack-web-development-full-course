<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Callback Digital Clock</title>
  <style>
    body {
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      background: #222;
      color: #fff;
      font-family: Arial, sans-serif;
    }
    #clock {
      font-size: 3rem;
      padding: 20px 40px;
      border: 3px solid #00ffcc;
      border-radius: 12px;
      background: #333;
      box-shadow: 0px 0px 20px #00ffcc;
    }
  </style>
</head>
<body>

  <div id="clock">00:00:00</div>

  <script>
    // Callback function to update the clock
    function updateClock() {
      let now = new Date();
      let hours = String(now.getHours()).padStart(2, '0');
      let minutes = String(now.getMinutes()).padStart(2, '0');
      let seconds = String(now.getSeconds()).padStart(2, '0');

      document.getElementById("clock").innerText = `${hours}:${minutes}:${seconds}`;
    }

    // setInterval calls updateClock every 1000ms (1 second)
    setInterval(updateClock, 1000);

    // Call it once immediately so it doesn’t wait for 1 sec
    updateClock();
  </script>

</body>
</html>
