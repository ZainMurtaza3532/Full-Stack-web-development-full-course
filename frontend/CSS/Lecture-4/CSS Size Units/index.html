<!DOCTYPE html>
<html>
<head>
    <title>CSS Size Units</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<h1>CSS Size Units Demo</h1>

<h2>1. PX Unit</h2>
<div class="px-box">Width: 300px</div>

<h2>2. Percentage (%)</h2>
<div class="parent">
    <div class="percent-box">Width: 50%</div>
</div>

<h2>3. VW (Viewport Width)</h2>
<div class="vw-box">Width: 50vw</div>

<h2>4. VH (Viewport Height)</h2>
<div class="vh-box">Height: 40vh</div>

<h2>5. EM Unit</h2>
<div class="em-parent">
    Parent font-size 20px
    <p class="em-text">Font-size: 2em</p>
</div>

<h2>6. REM Unit</h2>
<p class="rem-text">Font-size: 2rem</p>

</body>
</html>
