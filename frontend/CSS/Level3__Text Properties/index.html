<!DOCTYPE html>
<html>
<head>
    <title>CSS Text Properties</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <h1 class="heading">CSS Text Properties</h1>

    <p class="color">This is colored text.</p>

    <p class="align">This text is center aligned.</p>

    <p class="decoration">This text has underline.</p>

    <p class="transform">this text will become uppercase.</p>

    <p class="spacing">Spacing example text.</p>

    <p class="indent">
        This paragraph has text indent. Lorem ipsum dolor sit amet consectetur adipisicing elit.
    </p>

    <p class="shadow">Shadow Text Effect</p>

</body>
</html>
